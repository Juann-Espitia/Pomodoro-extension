<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Learning Timer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <!-- ── TIMER VIEW ─────────────────────────────── -->
    <div id="view-timer">
      <header>
        <h1 class="app-title">Pomodoro Timer</h1>
        <div class="header-row">
          <div class="phase-label" id="phase-label">Focus Time</div>
          <button class="btn-icon" id="btn-settings" title="Settings">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </header>

      <div class="timer-ring-wrapper">
        <svg class="timer-ring" viewBox="0 0 220 220" width="220" height="220">
          <circle class="ring-track" cx="110" cy="110" r="90" fill="none" stroke-width="10"/>
          <circle class="ring-progress" id="ring-progress" cx="110" cy="110" r="90" fill="none" stroke-width="10" stroke-linecap="round" transform="rotate(-90 110 110)"/>
        </svg>
        <div class="timer-center">
          <div class="time-display" id="time-display">25:00</div>
          <div class="session-info" id="session-info">Session 1</div>
        </div>
      </div>

      <div class="dots-row">
        <div class="dot" id="dot-0"></div>
        <div class="dot" id="dot-1"></div>
        <div class="dot" id="dot-2"></div>
        <div class="dot" id="dot-3"></div>
      </div>
      <div class="dots-label">pomodoros until long break</div>

      <div class="controls">
        <button class="btn btn-secondary" id="btn-reset" title="Reset current session">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-4"/>
          </svg>
        </button>

        <button class="btn btn-primary" id="btn-start-pause">
          <svg id="icon-play" viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
          <svg id="icon-pause" viewBox="0 0 24 24" width="28" height="28" fill="currentColor" style="display:none">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>

        <button class="btn btn-secondary" id="btn-skip" title="Skip to next phase">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5,4 15,12 5,20" fill="currentColor" stroke="none"/>
            <line x1="19" y1="4" x2="19" y2="20"/>
          </svg>
        </button>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat-value" id="total-pomodoros">0</span>
          <span class="stat-label">total today</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-value" id="cycle-progress">0/4</span>
          <span class="stat-label">this cycle</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <button class="btn-text" id="btn-reset-all">reset all</button>
        </div>
      </div>
    </div>

    <!-- ── SETTINGS VIEW ──────────────────────────── -->
    <div id="view-settings" class="hidden">
      <header>
        <div class="settings-header-row">
          <button class="btn-icon" id="btn-back" title="Back">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15,18 9,12 15,6"/>
            </svg>
          </button>
          <h2 class="settings-title">Settings</h2>
        </div>
      </header>

      <div class="settings-body">
        <!-- Durations -->
        <div class="settings-section">
          <div class="settings-section-label">Durations (minutes)</div>

          <div class="setting-row">
            <label for="input-focus">Focus</label>
            <div class="input-group">
              <button class="btn-stepper" data-target="input-focus" data-dir="-1">−</button>
              <input type="number" id="input-focus" min="1" max="120" value="25">
              <button class="btn-stepper" data-target="input-focus" data-dir="1">+</button>
            </div>
          </div>

          <div class="setting-row">
            <label for="input-short">Short break</label>
            <div class="input-group">
              <button class="btn-stepper" data-target="input-short" data-dir="-1">−</button>
              <input type="number" id="input-short" min="1" max="60" value="5">
              <button class="btn-stepper" data-target="input-short" data-dir="1">+</button>
            </div>
          </div>

          <div class="setting-row">
            <label for="input-long">Long break</label>
            <div class="input-group">
              <button class="btn-stepper" data-target="input-long" data-dir="-1">−</button>
              <input type="number" id="input-long" min="1" max="120" value="15">
              <button class="btn-stepper" data-target="input-long" data-dir="1">+</button>
            </div>
          </div>
        </div>

        <!-- Alert Sound -->
        <div class="settings-section">
          <div class="settings-section-label">Alert Sound</div>
          <div class="sound-list" id="sound-list">
            <!-- populated by popup.js -->
          </div>
        </div>
      </div>

      <button class="btn-save" id="btn-save">Save Changes</button>
    </div>

  </div>

  <script src="sounds.js"></script>
  <script src="popup.js"></script>
</body>
</html>
